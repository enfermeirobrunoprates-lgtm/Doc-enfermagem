<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#042f2e" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background with smooth rounded corners suitable for maskable icons -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <!-- Subtle circular pulse line -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="white" stroke-width="6" stroke-opacity="0.15" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.1" />

  <!-- Centered heart and medical cross emblem -->
  <g filter="url(#shadow)">
    <!-- Heart Path -->
    <path d="M256,380 C256,380 130,285 130,195 C130,135 175,95 230,95 C242,95 250,99 256,104 C262,99 270,95 282,95 C337,95 382,135 382,195 C382,285 256,380 256,380 Z" fill="white" />
    
    <!-- Medical Cross inside Heart -->
    <path d="M241,155 h30 v30 h30 v30 h-30 v30 h-30 v-30 h-30 v-30 h30 z" fill="#0d9488" />
  </g>
</svg>
